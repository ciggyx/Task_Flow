version: '3.8'
services:
  db:
    image: postgres:alpine
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_PASSWORD: taskDatabase
      POSTGRES_USER: postgres
      POSTGRES_DB: task
    ports:
      - '5431:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
networks:
  task-net:
    external: true
