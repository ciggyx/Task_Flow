services:
  db-task:
    image: postgres:alpine
    container_name: microservice-task-db
    restart: always
    env_file:
      - .env.db
    ports:
      - '5431:5432'
    volumes:
      - postgres_task_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_task_data:
