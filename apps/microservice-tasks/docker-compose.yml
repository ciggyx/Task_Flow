services:
  db-task:
    image: postgres:alpine
    container_name: db-task
    restart: always
    environment:
      POSTGRES_PASSWORD: taskDatabase
      POSTGRES_USER: postgres
      POSTGRES_DB: task
    ports:
      - '5431:5432'
    volumes:
      - postgres_task_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_task_data:
