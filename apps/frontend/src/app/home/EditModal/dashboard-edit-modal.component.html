<div class="modal-backdrop" (click)="Cancel()">
  <div class="modal" 
       cdkDrag 
       cdkDragBoundary=".modal-backdrop" 
       (click)="$event.stopPropagation()">
    
    <div class="modal-header">
      <h2>Edit Dashboard</h2>
    </div>

    <div class="modal-content">
      <div class="field">
        <label>Name</label>
        <input type="text" [(ngModel)]="editedDashboard.name" placeholder="Enter name" />
      </div>

      <div class="field">
        <label>Description</label>
        <input type="text" [(ngModel)]="editedDashboard.description" placeholder="Enter description" />
      </div>

      <div class="checkbox-wrapper">
        <input type="checkbox" id="edit-review" [(ngModel)]="editedDashboard.requiresReview" />
        <label for="edit-review">Requires Review</label>
      </div>
      
      <div class="templates-section">
        <label class="section-title">Choose a template</label>
        <div class="templates-grid">
          <div class="template-card" 
               *ngFor="let image of dashboardImages"
               (click)="selectTemplate(image.id); $event.stopPropagation()"
               [class.selected]="selectedImageId === image.id">
            <div class="img-container">
              <img [src]="image.url" [alt]="image.label" />
            </div>
            <span>{{ image.label }}</span>
          </div>
        </div>
      </div>
    </div>
    
    <div class="modal-footer">
      <button class="btn-delete" (click)="onDelete()">Delete</button>
      
      <div class="main-actions">
        <button class="btn-secondary" (click)="Cancel()">Close</button>
        <button class="btn-primary" (click)="Save()">Save Changes</button>
      </div>
    </div>
  </div>
</div>
