<app-header></app-header>
<div class="main-container">
  <div class="main-content" [ngClass]="{ 'shifted': isSidebarOpen }">
    
    <header class="section-header">
      <h1 class="title">My Dashboards</h1>
      <p class="subtitle">Manage and view your personal data visualizations</p>
    </header>

    <div class="dashboard-grid">
      <div *ngFor="let dashboard of ownedDashboards" class="dashboard-card">
        <div class="card-top" (click)="goToDashboard(dashboard.id)" role="button" tabindex="0">
          <img [src]="getPresetImage(dashboard)" [alt]="dashboard.name" />
        </div>
        <div class="card-bottom">
          <span class="card-name">{{ dashboard.name }}</span>
          <button class="icon-btn" (click)="openEditModal(dashboard)">
            <i class="bi bi-three-dots-vertical"></i>
          </button>
        </div>
      </div>

      <div class="add-card" (click)="openCreateModal()">
        <div class="add-content">
          <i class="bi bi-plus-circle"></i>
          <span>New Dashboard</span>
        </div>
      </div>
    </div>

    <header class="section-header shared-section">
      <h1 class="title">Shared with me</h1>
      <p class="subtitle">Dashboards collaborated on with other team members</p>
    </header>

    <div class="dashboard-grid">
      <div *ngFor="let dashboard of sharedDashboards" class="dashboard-card shared">
        <div class="card-top" (click)="goToDashboard(dashboard.id)" role="button" tabindex="0">
          <img [src]="getPresetImage(dashboard)" [alt]="dashboard.name" />
        </div>
        <div class="card-bottom">
          <span class="card-name">{{ dashboard.name }}</span>
        </div>
      </div>
    </div>

  </div>
</div>

<app-dashboard-create-modal *ngIf="showCreateModal" ...></app-dashboard-create-modal>
<app-dashboard-edit-modal *ngIf="showEditModal && dashboardToEdit" ...></app-dashboard-edit-modal>
