<div class="task-modal-backdrop">
  <div class="task-modal">
    <h2>Edit Task</h2>

    <form>
      <!-- Task Name -->
      <label>
        Name:
        <input type="text" [(ngModel)]="createdTask.name" name="name" />
      </label>

      <!-- Description -->
      <label>
        Description:
        <textarea [(ngModel)]="createdTask.description" name="description"></textarea>
      </label>

      <!-- Dates -->
      <label>
        Due Date:
        <input type="date" [(ngModel)]="createdTask.endDate" name="endDate" />
      </label>

      <!-- User assignment -->
      <label>
        Assigned User:
        <select [(ngModel)]="createdTask.assignedToUserId" name="user">
          <option [ngValue]="null">Unassigned</option>
          <option *ngFor="let user of users" [ngValue]="user.id">
            {{ user.name }}
          </option>
        </select>
      </label>

      <label>
        priority:
        <select [(ngModel)]="createdTask.priorityId" name="priority">
          <option *ngFor="let priority of priorities" [ngValue]="priority.id">
            {{ priority.name }}
          </option>
        </select>
      </label>

      <div class="task-modal-actions">
        <button type="button" (click)="onSave()">Save</button>
        <button type="button" (click)="onCancel()">Cancel</button>
      </div>
    </form>
  </div>
</div>
