<app-header></app-header>
<section class="profile-page">
  <h1 class="page-title">Profile and Visibility</h1>

  <div class="banner">
    <!-- decorative banner graphic -->
    <div class="banner-actions">
      <!-- placeholder for actions if needed -->
    </div>
  </div>

  <div class="profile-card">
    <!-- Left column: avatar -->
    <aside class="avatar-column">
      <div class="avatar-wrap">
        <img [src]="avatarPreview || defaultAvatar" alt="Profile avatar" class="avatar" />
        <div class="avatar-actions">
          <label class="upload-btn" for="avatarInput">Change</label>
          <input
            id="avatarInput"
            type="file"
            accept="image/*"
            (change)="onAvatarSelected($event)"
            hidden
          />
          <button type="button" class="remove-btn" (click)="removeAvatar()">Remove</button>
        </div>
      </div>
      <div class="visibility-note">
        <span class="muted">Always public</span>
      </div>
    </aside>

    <!-- Right column: profile form -->
    <form class="form-column" [formGroup]="form" (ngSubmit)="saveProfile()">
      <section class="card-section">
        <h2 class="section-title">Manage your personal information</h2>
      </section>

      <section class="card-section about">
        <h3>About</h3>
        <small class="muted"
          >Required fields are marked with an asterisk<span class="required">*</span></small
        >

        <label class="field">
          <span class="label-text">Username <span class="required">*</span></span>
          <input formControlName="username" type="text" class="input" aria-label="Username" />
          <div
            *ngIf="form.get('username')?.touched && form.get('username')?.invalid"
            class="field-error"
          ></div>
        </label>

        <label class="field">
          <span class="label-text">Bio</span>
          <textarea formControlName="bio" rows="4" class="textarea" aria-label="Bio"></textarea>
          <div class="field-hint muted">Share a short bio (max 500 chars).</div>
        </label>
      </section>

      <footer class="form-footer">
        <button type="submit" class="save-btn">Save</button>
      </footer>
    </form>
  </div>
</section>
