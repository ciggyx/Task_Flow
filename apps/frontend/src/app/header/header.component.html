<app-sidebar [isOpen]="isSidebarOpen" (closeSidebar)="toggleMenu()"></app-sidebar>

<div class="topbar">
  <div class="topbar-content">
    
    <div class="left-section">
      <button 
        class="menu-btn" 
        [class.shift]="isSidebarOpen" 
        (click)="toggleMenu()"
        type="button">
        <i class="bi bi-list"></i>
      </button>
    </div>

    <div class="right-section">
      <button 
        *ngIf="showStatsButton" 
        class="header-icon-btn stats-btn" 
        (click)="goToStats()" 
        title="View Statistics">
        <i class="bi bi-bar-chart-fill"></i>
      </button>
      
      <div class="dropdown">
        <button 
          class="header-icon-btn" 
          type="button" 
          id="notifDropdown" 
          data-bs-toggle="dropdown" 
          aria-expanded="false">
          <i class="bi bi-bell"></i>
          <span *ngIf="unreadCount > 0" class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle">
            {{ unreadCount }}
          </span>
        </button>

        <ul class="dropdown-menu dropdown-menu-end notification-menu" aria-labelledby="notifDropdown">
            <li class="px-3 py-2 d-flex justify-content-between align-items-center bg-light">
              <span class="fw-bold small text-dark">Notifications</span>
              <button class="btn btn-link btn-sm p-0 text-decoration-none small" (click)="markAllRead($event)">
                Mark all as read
              </button>
            </li>
            <li><hr class="dropdown-divider m-0"></li>
            
            <div class="notification-list">
              <li *ngIf="notifications.length === 0" class="px-3 py-4 text-center text-muted small">
                No new notifications
              </li>
              
              <li *ngFor="let note of notifications" 
                  class="dropdown-item notification-item" 
                  [class.unread]="note.isRead === false"
                  (click)="markAsRead(note, $event)">
                
                <div class="d-flex align-items-start">
                  <div class="flex-grow-1 d-flex flex-column">
                    <span class="fw-bold small notif-title">{{ note.title }}</span>
                    <span class="text-wrap small text-muted">{{ note.message }}</span>
                    
                    <div *ngIf="note.type === 'FRIEND_REQUEST' && !note.isRead" class="mt-2 d-flex gap-2">
                      <button class="btn btn-primary btn-xs" 
                              (click)="handleFriendRequest(note.relatedResourceId, true, $event, note.id)">
                        Confirmar
                      </button>
                      <button class="btn btn-secondary btn-xs" 
                              (click)="handleFriendRequest(note.relatedResourceId, false, $event, note.id)">
                        Eliminar
                      </button>
                    </div>
                    <span class="sx-date text-primary mt-1">{{ note.createdAt | date:'shortTime' }}</span>
                  </div>
                  
                  <div *ngIf="note.isRead === false" class="ms-2 mt-1">
                    <i class="bi bi-circle-fill text-primary" style="font-size: 8px;"></i>
                  </div>
                </div>
              </li>
            </div>
          </ul>
      </div>

      <button 
        *ngIf="showInviteButton" 
        class="btn invite-btn" 
        (click)="invitePeople()"
        title="Invite people">
        <i class="bi bi-person-plus-fill"></i>
        <span class="d-none d-md-inline ms-1">Invite</span>
      </button>

      <div class="dropdown">
        <button
          class="header-icon-btn"
          type="button"
          id="profileDropdown"
          data-bs-toggle="dropdown"
          aria-expanded="false">
          <span class="user-avatar-initials">{{ userInitials }}</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end profile-menu" aria-labelledby="profileDropdown">
          <li><a class="dropdown-item" (click)="goToProfile()"><i class="bi bi-person me-2"></i>Profile</a></li>
          <li><hr class="dropdown-divider"></li>
          <li><a class="dropdown-item text-danger" (click)="logout()"><i class="bi bi-box-arrow-right me-2"></i>Logout</a></li>
        </ul>
      </div>

    </div>
  </div>
</div>

<app-invite-people 
  [show]="isInviteModalOpen" 
  (close)="isInviteModalOpen = false"
  (inviteUser)="handleInviteUser($event)">
</app-invite-people>
