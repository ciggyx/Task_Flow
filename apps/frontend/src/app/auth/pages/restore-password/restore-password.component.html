<div class="register-wrapper">
  <div class="card register-card shadow">
    <h3 class="mb-3 text-center" style="color: #713e5a; font-weight: 800;">Restore Password</h3>

    <div *ngIf="successMessage" class="text-center py-4">
      <div class="mb-4">
        <i class="bi bi-check-circle-fill" style="font-size: 4rem; color: #63a375;"></i>
      </div>
      <h3 class="mb-3" style="color: #713e5a; font-weight: 800;">Success!</h3>
      <p style="color: #713e5a; opacity: 0.8; font-size: 0.95rem;">
        {{ successMessage }}
      </p>
    </div>

    <div *ngIf="!successMessage">
      <p class="text-center mb-4" style="color: #713e5a; font-size: 0.9rem; opacity: 0.8;">
        Please enter your new credentials below.
      </p>

      <div *ngIf="errorMessage" class="alert alert-danger text-center mb-3" 
           style="background-color: #fdfaf5; border-color: #ca6680; color: #ca6680; font-size: 0.85rem;">
        {{ errorMessage }}
      </div>

      <form [formGroup]="restoreForm" (ngSubmit)="onSubmit()">
        <div class="input-group mb-3 custom-input">
          <span class="input-group-text"><i class="bi bi-envelope-fill"></i></span>
          <input type="email" class="form-control" placeholder="Email" formControlName="email" />
        </div>

        <div class="input-group mb-3 custom-input">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control" placeholder="New Password" formControlName="password" />
        </div>

        <div class="input-group mb-4 custom-input">
          <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
          <input type="password" class="form-control" placeholder="Repeat Password" formControlName="confirmPassword" />
        </div>

        <button type="submit" class="btn btn-login w-100" 
                [disabled]="restoreForm.invalid || loading">
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          {{ loading ? 'Updating...' : 'Restore Password' }}
        </button>

        <div class="text-center mt-4">
          <a routerLink="/auth/login" class="small" style="color: #d57a66; font-weight: 700; text-decoration: none;">
            <i class="bi bi-arrow-left me-1"></i> Back to Login
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
