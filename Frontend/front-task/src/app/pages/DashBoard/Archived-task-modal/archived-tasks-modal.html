<div class="modal" cdkDrag (click)="$event.stopPropagation()">
  <div class="modal-header" cdkDragHandle>
    <h2>Archived</h2>
  </div>
  <div
    class="tasks-container"
    cdkDropList
    [id]="'drop-list-archived'"
    [cdkDropListData]="archivedTasks"
    [cdkDropListConnectedTo]="connectedDropLists"
    (cdkDropListDropped)="onDrop($event)"
  >
    <div
      class="task-card"
      *ngFor="let task of archivedTasks; trackBy: trackByTask"
      cdkDrag
      [cdkDragData]="task"
    >
      <!-- Drag preview template (optional) -->
      <div class="drag-placeholder" *cdkDragPlaceholder></div>

      <!-- Task header -->
      <div class="task-header">
        <h4 class="task-name">{{ task.name }}</h4>
      </div>

      <!-- Task description -->
      <p class="task-description" *ngIf="task.description">{{ task.description }}</p>

      <!-- Task dates -->
      <div class="task-dates">
        <div class="date-item" *ngIf="task.startDate">
          <strong>Start:</strong> {{ task.startDate | date:'MMM dd, yyyy' }}
        </div>
        <div class="date-item" *ngIf="task.endDate">
          <strong>Due:</strong> {{ task.endDate | date:'MMM dd, yyyy' }}
        </div>
        <div class="date-item" *ngIf="task.finishDate">
          <strong>Finished:</strong> {{ task.finishDate | date:'MMM dd, yyyy' }}
        </div>
        <div class="author" *ngIf="task.userId">
          <strong>By:</strong> {{ getUserName(task.userId) }}
        </div>
      </div>
    </div>
  </div>
</div>
