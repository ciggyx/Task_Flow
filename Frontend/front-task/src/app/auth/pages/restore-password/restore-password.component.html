<div class="register-wrapper">
  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card register-card p-4 shadow">
      <h3 class="mb-3 text-center">Restore Password</h3>

      <!-- Success Message (replaces form temporarily) -->
      <div
        *ngIf="successMessage"
        class="alert alert-success text-center d-flex flex-column align-items-center justify-content-center"
        style="min-height: 200px"
      >
        <i class="bi bi-check-circle-fill" style="font-size: 2rem; color: green"></i>
        <p class="mt-2">{{ successMessage }}</p>
      </div>

      <!-- Error Message (keeps form visible) -->
      <div *ngIf="errorMessage" class="alert alert-danger text-center">
        {{ errorMessage }}
      </div>

      <!-- Form (hidden when success message is shown) -->
      <div *ngIf="!successMessage">
        <form [formGroup]="restoreForm" (ngSubmit)="onSubmit()">
          <!-- Email (editable) -->
          <div class="input-group mb-3 custom-input">
            <span class="input-group-text">
              <i class="bi bi-envelope-fill"></i>
            </span>
            <input type="email" class="form-control" placeholder="Email" formControlName="email" />
          </div>

          <!-- New Password -->
          <div class="input-group mb-3 custom-input">
            <span class="input-group-text">
              <i class="bi bi-lock-fill"></i>
            </span>
            <input
              type="password"
              class="form-control"
              placeholder="New Password"
              formControlName="password"
            />
          </div>

          <!-- Confirm Password -->
          <div class="input-group mb-3 custom-input">
            <span class="input-group-text">
              <i class="bi bi-lock-fill"></i>
            </span>
            <input
              type="password"
              class="form-control"
              placeholder="Repeat Password"
              formControlName="confirmPassword"
            />
          </div>

          <!-- Submit Button -->
          <button
            type="submit"
            class="btn btn-login w-100"
            [disabled]="restoreForm.invalid || restoreForm.errors?.['mismatch']"
          >
            Restore Password
          </button>

          <div class="text-center mt-3">
            <a routerLink="/auth/login">Back to Login</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
